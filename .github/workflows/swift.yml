name: Deploy App

on:
  push:
    branches: [ "main" ]
    tags: [ "v*.*.*" ]        # e.g. v1.2.3 triggers a signed release + ASC upload
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:          # manual "Run workflow" button
    inputs:
      scheme:
        description: 'Scheme to archive and upload'
        required: true
        default: 'Cyface Production'
        type: choice
        options:
          - Cyface Production
          - Cyface Staging
          - Cyface Development

jobs:
  # ---------------------------------------------------------------------------
  # Runs on every push/PR to main. No secrets required, so PRs from forks pass.
  # ---------------------------------------------------------------------------
  test:
    name: Test
    runs-on: macos-15
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run Unit Tests
        run: |
          xcodebuild -scheme "Cyface Development" \
            -destination "platform=iOS Simulator,name=iPhone SE (3rd generation)" \
            -skip-testing:cyfaceappUITests \
            test

  # ---------------------------------------------------------------------------
  # Signed archive + upload to App Store Connect.
  # Only runs for version tags (v*.*.*) or a manual dispatch — never on PRs,
  # so fork PRs without secret access don't fail here.
  # ---------------------------------------------------------------------------
  release:
    name: Build & Upload to App Store Connect
    needs: test
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: macos-15
    env:
      SCHEME: ${{ github.event.inputs.scheme || 'Cyface Production' }}
      TEAM_ID: '45GZ5C9N64'
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install the Apple Distribution Certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          # Decode the distribution certificate from secrets
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH

          # Create a temporary keychain and make it the default search list
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Import the certificate + private key
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH

          # REQUIRED: let codesign use the private key non-interactively.
          # Without this, codesign hangs / fails on the runner.
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Install App Store Connect API Key
        env:
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
        run: |
          # altool/xcodebuild look for the key here automatically
          mkdir -p ~/private_keys
          echo -n "$APP_STORE_CONNECT_API_KEY" | base64 --decode -o ~/private_keys/AuthKey_$APP_STORE_CONNECT_KEY_ID.p8

      - name: Generate ExportOptions.plist
        run: |
          cat > $RUNNER_TEMP/ExportOptions.plist <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>teamID</key>
              <string>45GZ5C9N64</string>
              <key>signingStyle</key>
              <string>automatic</string>
              <key>uploadSymbols</key>
              <true/>
              <key>destination</key>
              <string>export</string>
          </dict>
          </plist>
          PLIST

      - name: Build Archive
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          xcodebuild -scheme "$SCHEME" \
            -archivePath $RUNNER_TEMP/cyfaceapp.xcarchive \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -authenticationKeyPath ~/private_keys/AuthKey_$APP_STORE_CONNECT_KEY_ID.p8 \
            -authenticationKeyID $APP_STORE_CONNECT_KEY_ID \
            -authenticationKeyIssuerID $APP_STORE_CONNECT_ISSUER_ID \
            -allowProvisioningUpdates \
            clean archive

      - name: Export IPA
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/cyfaceapp.xcarchive \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/build \
            -authenticationKeyPath ~/private_keys/AuthKey_$APP_STORE_CONNECT_KEY_ID.p8 \
            -authenticationKeyID $APP_STORE_CONNECT_KEY_ID \
            -authenticationKeyIssuerID $APP_STORE_CONNECT_ISSUER_ID \
            -allowProvisioningUpdates

      - name: Upload to App Store Connect
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          IPA_FILE=$(find $RUNNER_TEMP/build -name "*.ipa" | head -n 1)
          echo "Uploading: $IPA_FILE"
          xcrun altool --upload-app \
            --type ios \
            --file "$IPA_FILE" \
            --apiKey "$APP_STORE_CONNECT_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID" \
            --verbose

      - name: Upload IPA as build artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app
          path: ${{ runner.temp }}/build/*.ipa
          retention-days: 7

      - name: Clean up keychain
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true
          rm -rf ~/private_keys || true
